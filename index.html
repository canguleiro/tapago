<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tá Pago!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Hide scrollbar for category selector but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-4 shadow-lg shrink-0 z-10">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-2xl font-bold flex items-center gap-2">
                        <i class="fas fa-coins text-yellow-400"></i> 
                        Tá Pago!
                    </h1>
                    <p class="text-xs text-indigo-200 mt-0.5">Controle mensal contínuo</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="openCategoryModal()" class="text-xs bg-indigo-800/50 hover:bg-indigo-600 border border-indigo-400/30 px-3 py-1.5 rounded-full transition flex items-center gap-2" title="Gerenciar Categorias">
                        <i class="fas fa-tags"></i> <span class="hidden sm:inline">Categorias</span>
                    </button>
                    <button onclick="toggleNotificationPermission()" id="notif-btn" class="text-xs bg-indigo-800/50 hover:bg-indigo-600 border border-indigo-400/30 px-3 py-1.5 rounded-full transition flex items-center gap-2">
                        <i class="fas fa-bell"></i> <span class="hidden sm:inline">Alertas</span>
                    </button>
                </div>
            </div>
            
            <!-- Resumo Financeiro -->
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white/10 p-3 rounded-xl backdrop-blur-sm border border-white/10">
                    <p class="text-xs text-indigo-100 uppercase font-semibold mb-1">A Pagar (Este Mês)</p>
                    <p class="text-2xl font-bold tracking-tight" id="total-pending">R$ 0,00</p>
                </div>
                <div class="bg-emerald-500/20 p-3 rounded-xl backdrop-blur-sm border border-emerald-400/20">
                    <p class="text-xs text-emerald-100 uppercase font-semibold mb-1">Pago (Este Mês)</p>
                    <p class="text-2xl font-bold tracking-tight" id="total-paid">R$ 0,00</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Filtros de Mês e Ordenação -->
    <div class="bg-white border-b border-gray-200 py-2 px-4 shrink-0 shadow-sm z-0">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center bg-gray-50 rounded-full px-1 py-1 border border-gray-100">
                <button onclick="changeMonth(-1)" class="text-gray-500 hover:text-indigo-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-white transition shadow-sm"><i class="fas fa-chevron-left text-sm"></i></button>
                <span id="current-month-display" class="font-bold text-gray-700 capitalize w-28 text-center text-sm">Janeiro 2024</span>
                <button onclick="changeMonth(1)" class="text-gray-500 hover:text-indigo-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-white transition shadow-sm"><i class="fas fa-chevron-right text-sm"></i></button>
            </div>
            
            <!-- Novo Filtro de Ordenação -->
            <div class="flex items-center gap-2">
                <i class="fas fa-sort-amount-down-alt text-gray-400 text-sm"></i>
                <select id="sort-order" onchange="renderBills()" class="text-xs font-semibold text-gray-600 bg-white border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-200 shadow-sm cursor-pointer hover:border-indigo-300 transition">
                    <option value="date">Vencimento</option>
                    <option value="category">Categoria</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Lista de Contas -->
    <main class="flex-1 overflow-y-auto p-4 bg-gray-50 relative" id="main-container">
        <div class="max-w-2xl mx-auto space-y-3 pb-20" id="bills-list">
            <!-- Injetado via JS -->
        </div>
    </main>

    <!-- Botão Adicionar Conta -->
    <button onclick="openModal()" class="absolute bottom-6 right-6 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-xl hover:bg-indigo-700 hover:scale-105 transition flex items-center justify-center text-2xl z-20 focus:outline-none focus:ring-4 focus:ring-indigo-300">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal Form (Conta) -->
    <div id="modal" class="fixed inset-0 bg-black/60 z-40 hidden flex items-end sm:items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-md transform scale-95 opacity-0 transition-all duration-300 max-h-[90vh] overflow-y-auto" id="modal-content">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800" id="modal-title">Nova Conta Recorrente</h2>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                </div>
                
                <form id="bill-form" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="bill-id">
                    
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Nome da Despesa</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-tag"></i></span>
                                <input type="text" id="bill-name" required placeholder="Ex: Aluguel, Netflix" class="w-full pl-10 pr-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Valor</label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">R$</span>
                                    <input type="number" step="0.01" id="bill-amount" placeholder="0,00" class="w-full pl-10 pr-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Vencimento Inicial</label>
                                <input type="date" id="bill-date" required class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition text-gray-600">
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide">Categoria</label>
                                <button type="button" onclick="openCategoryModal()" class="text-xs text-indigo-600 hover:underline">Gerenciar</button>
                            </div>
                            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="category-selector">
                                <!-- JS Injected -->
                            </div>
                            <input type="hidden" id="bill-category">
                        </div>
                        
                        <div class="flex items-center gap-2 text-xs text-indigo-600 bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                            <i class="fas fa-info-circle"></i>
                            <span>Esta conta será renovada automaticamente todo mês ao ser paga.</span>
                        </div>
                    </div>

                    <div class="mt-8">
                        <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-bold tracking-wide transition shadow-lg shadow-indigo-500/30 active:scale-95">
                            Salvar Recorrência
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal de Categorias -->
    <div id="category-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md transform scale-95 opacity-0 transition-all duration-300 max-h-[90vh] flex flex-col" id="category-modal-content">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center shrink-0">
                <h2 class="text-lg font-bold text-gray-800"><i class="fas fa-tags mr-2 text-indigo-600"></i>Gerenciar Categorias</h2>
                <button onclick="closeCategoryModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <!-- Lista de Categorias Atuais -->
            <div class="p-5 overflow-y-auto max-h-48 border-b border-gray-100 bg-gray-50 shrink-0">
                <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Suas Categorias</p>
                <div class="space-y-2" id="manage-category-list">
                    <!-- Injetado via JS -->
                </div>
            </div>

            <!-- Formulário Nova/Editar Categoria -->
            <div class="p-5 overflow-y-auto">
                <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3" id="cat-form-title">Adicionar Nova</p>
                <form id="category-form" onsubmit="handleCategorySubmit(event)">
                    <input type="hidden" id="cat-edit-id">
                    
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Nome</label>
                        <input type="text" id="cat-name" required placeholder="Ex: Lazer" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 outline-none">
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-600 mb-2">Cor</label>
                        <div class="flex flex-wrap gap-2" id="cat-color-picker">
                            <!-- Injetado via JS -->
                        </div>
                        <input type="hidden" id="cat-color" required>
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-semibold text-gray-600 mb-2">Ícone</label>
                        <div class="grid grid-cols-6 gap-2" id="cat-icon-picker">
                            <!-- Injetado via JS -->
                        </div>
                        <input type="hidden" id="cat-icon" required>
                    </div>

                    <div class="flex gap-2">
                        <button type="button" onclick="resetCategoryForm()" class="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg font-semibold hover:bg-gray-200 transition text-sm">Cancelar</button>
                        <button type="submit" class="flex-1 py-2 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 transition text-sm">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-900/90 backdrop-blur text-white px-6 py-3 rounded-full shadow-2xl transform -translate-y-20 transition-all duration-300 z-[60] flex items-center gap-3 min-w-[300px]">
        <i class="fas fa-check-circle text-emerald-400 text-xl"></i>
        <div>
            <div class="font-bold text-sm" id="toast-title">Sucesso</div>
            <div class="text-xs text-gray-300" id="toast-message">Ação realizada.</div>
        </div>
    </div>

    <script>
        // --- Configuração e Estado ---
        let bills = JSON.parse(localStorage.getItem('recurringBills')) || [];
        let viewDate = new Date(); 
        
        // Cores e Ícones disponíveis para criação de categorias
        const availableColors = [
            'text-indigo-600 bg-indigo-100', 'text-purple-600 bg-purple-100', 
            'text-emerald-600 bg-emerald-100', 'text-amber-600 bg-amber-100', 
            'text-red-600 bg-red-100', 'text-blue-600 bg-blue-100', 
            'text-pink-600 bg-pink-100', 'text-teal-600 bg-teal-100', 
            'text-gray-600 bg-gray-100'
        ];
        
        const availableIcons = [
            'fa-home', 'fa-shopping-cart', 'fa-car', 'fa-heartbeat', 
            'fa-credit-card', 'fa-chart-line', 'fa-bolt', 'fa-mobile-alt', 
            'fa-graduation-cap', 'fa-plane', 'fa-paw', 'fa-box', 
            'fa-wifi', 'fa-tv', 'fa-water', 'fa-gamepad', 'fa-utensils', 'fa-dumbbell'
        ];

        // Categorias Padrão (se não houver no localStorage)
        const defaultCategories = [
            { id: 'home', icon: 'fa-home', label: 'Moradia', color: 'text-indigo-600 bg-indigo-100' },
            { id: 'card', icon: 'fa-credit-card', label: 'Cartões', color: 'text-purple-600 bg-purple-100' },
            { id: 'food', icon: 'fa-shopping-cart', label: 'Mercado', color: 'text-emerald-600 bg-emerald-100' },
            { id: 'transport', icon: 'fa-car', label: 'Transporte', color: 'text-amber-600 bg-amber-100' },
            { id: 'health', icon: 'fa-heartbeat', label: 'Saúde', color: 'text-red-600 bg-red-100' },
            { id: 'invest', icon: 'fa-chart-line', label: 'Invest.', color: 'text-blue-600 bg-blue-100' }
        ];

        let categories = JSON.parse(localStorage.getItem('recurringCategories')) || defaultCategories;

        // --- Inicialização ---
        document.addEventListener('DOMContentLoaded', () => {
            renderBills();
            renderCategorySelector();
            updateMonthDisplay();
            checkReminders();
            initCategoryPickers();
            
            document.getElementById('bill-date').valueAsDate = new Date();
        });

        // --- Gerenciamento de Categorias ---
        function saveCategories() {
            localStorage.setItem('recurringCategories', JSON.stringify(categories));
            renderCategorySelector();
            renderCategoryManagerList();
            renderBills(); 
        }

        function openCategoryModal() {
            const modal = document.getElementById('category-modal');
            const content = document.getElementById('category-modal-content');
            
            renderCategoryManagerList();
            resetCategoryForm();
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeCategoryModal() {
            const modal = document.getElementById('category-modal');
            const content = document.getElementById('category-modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function initCategoryPickers() {
            const colorPicker = document.getElementById('cat-color-picker');
            colorPicker.innerHTML = availableColors.map(colorClass => `
                <button type="button" onclick="selectCatColor('${colorClass}')" data-color="${colorClass}" class="cat-color-btn w-8 h-8 rounded-full ${colorClass} border-2 border-transparent hover:scale-110 transition flex items-center justify-center">
                </button>
            `).join('');

            const iconPicker = document.getElementById('cat-icon-picker');
            iconPicker.innerHTML = availableIcons.map(icon => `
                <button type="button" onclick="selectCatIcon('${icon}')" data-icon="${icon}" class="cat-icon-btn w-10 h-10 rounded-lg bg-gray-100 text-gray-600 hover:bg-indigo-100 hover:text-indigo-600 border-2 border-transparent transition flex items-center justify-center text-lg">
                    <i class="fas ${icon}"></i>
                </button>
            `).join('');
            
            selectCatColor(availableColors[0]);
            selectCatIcon(availableIcons[0]);
        }

        function selectCatColor(colorClass) {
            document.getElementById('cat-color').value = colorClass;
            document.querySelectorAll('.cat-color-btn').forEach(btn => {
                if(btn.dataset.color === colorClass) {
                    btn.classList.add('border-gray-800', 'scale-110');
                    btn.innerHTML = '<i class="fas fa-check text-[10px]"></i>';
                } else {
                    btn.classList.remove('border-gray-800', 'scale-110');
                    btn.innerHTML = '';
                }
            });
        }

        function selectCatIcon(icon) {
            document.getElementById('cat-icon').value = icon;
            document.querySelectorAll('.cat-icon-btn').forEach(btn => {
                if(btn.dataset.icon === icon) {
                    btn.classList.add('border-indigo-500', 'bg-indigo-50', 'text-indigo-600');
                    btn.classList.remove('border-transparent', 'bg-gray-100', 'text-gray-600');
                } else {
                    btn.classList.remove('border-indigo-500', 'bg-indigo-50', 'text-indigo-600');
                    btn.classList.add('border-transparent', 'bg-gray-100', 'text-gray-600');
                }
            });
        }

        function renderCategoryManagerList() {
            const list = document.getElementById('manage-category-list');
            list.innerHTML = categories.map(cat => `
                <div class="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm border border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full ${cat.color} flex items-center justify-center text-sm">
                            <i class="fas ${cat.icon}"></i>
                        </div>
                        <span class="font-semibold text-gray-700 text-sm">${cat.label}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editCategory('${cat.id}')" class="w-8 h-8 rounded text-gray-400 hover:bg-indigo-50 hover:text-indigo-600 transition flex items-center justify-center">
                            <i class="fas fa-pen text-xs"></i>
                        </button>
                        <button onclick="deleteCategory('${cat.id}')" class="w-8 h-8 rounded text-gray-400 hover:bg-red-50 hover:text-red-600 transition flex items-center justify-center">
                            <i class="fas fa-trash text-xs"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function handleCategorySubmit(e) {
            e.preventDefault();
            const id = document.getElementById('cat-edit-id').value;
            const label = document.getElementById('cat-name').value;
            const color = document.getElementById('cat-color').value;
            const icon = document.getElementById('cat-icon').value;

            if (id) {
                const index = categories.findIndex(c => c.id === id);
                if (index !== -1) {
                    categories[index] = { id, label, color, icon };
                    showToast('Categoria Atualizada', `A categoria ${label} foi salva.`);
                }
            } else {
                const newId = 'cat_' + Date.now();
                categories.push({ id: newId, label, color, icon });
                showToast('Nova Categoria', `${label} criada com sucesso.`);
            }

            saveCategories();
            resetCategoryForm();
        }

        function editCategory(id) {
            const cat = categories.find(c => c.id === id);
            if (!cat) return;
            
            document.getElementById('cat-form-title').innerText = 'Editar Categoria';
            document.getElementById('cat-edit-id').value = cat.id;
            document.getElementById('cat-name').value = cat.label;
            selectCatColor(cat.color);
            selectCatIcon(cat.icon);
        }

        function deleteCategory(id) {
            if(categories.length <= 1) {
                alert('Você precisa ter pelo menos uma categoria.');
                return;
            }
            if(confirm('Apagar esta categoria? As contas que a utilizam continuarão existindo (com ícone padrão).')) {
                categories = categories.filter(c => c.id !== id);
                saveCategories();
                showToast('Categoria Excluída', 'Removida da lista.');
            }
        }

        function resetCategoryForm() {
            document.getElementById('category-form').reset();
            document.getElementById('cat-edit-id').value = '';
            document.getElementById('cat-form-title').innerText = 'Adicionar Nova';
            selectCatColor(availableColors[0]);
            selectCatIcon(availableIcons[0]);
        }

        // --- Navegação de Mês ---
        function changeMonth(delta) {
            viewDate.setMonth(viewDate.getMonth() + delta);
            updateMonthDisplay();
            renderBills();
        }

        function updateMonthDisplay() {
            const options = { year: 'numeric', month: 'long' };
            // Formata e garante que vai caber legal (Ex: "Fevereiro 2024")
            document.getElementById('current-month-display').innerText = viewDate.toLocaleDateString('pt-BR', options).replace(' de ', ' ');
        }

        // --- Lógica Principal de Contas ---
        function saveBills() {
            localStorage.setItem('recurringBills', JSON.stringify(bills));
            renderBills();
        }

        function addBill(bill) {
            bills.push(bill);
            saveBills();
            showToast('Conta Adicionada', 'A despesa foi registrada com sucesso!');
        }

        function updateBill(updatedBill) {
            const index = bills.findIndex(b => b.id === updatedBill.id);
            if (index !== -1) {
                bills[index] = updatedBill;
                saveBills();
                showToast('Atualizado', 'Conta editada com sucesso.');
            }
        }

        function deleteBill(id) {
            if(confirm('Isso apagará este registro específico. Deseja excluir?')) {
                bills = bills.filter(b => b.id !== id);
                saveBills();
            }
        }

        function toggleRenew(id) {
            const bill = bills.find(b => b.id === id);
            if (bill) {
                bill.doNotRenew = !bill.doNotRenew;
                saveBills();
            }
        }

        function togglePaid(id) {
            const bill = bills.find(b => b.id === id);
            if (!bill) return;

            if (!bill.paid) {
                bill.paid = true;
                bill.paidDate = new Date().toISOString();
                
                // Só cria o mês seguinte se NÃO estiver marcado para não renovar
                if (!bill.doNotRenew) {
                    createNextMonthInstance(bill);
                } else {
                    showToast('Conta Quitada!', `A conta ${bill.name} foi paga e não será renovada.`);
                }
            } else {
                bill.paid = false;
                delete bill.paidDate;
                showToast('Pagamento Cancelado', 'O status da conta voltou para pendente.');
            }
            saveBills();
        }

        function createNextMonthInstance(originalBill) {
            const currentDueDate = new Date(originalBill.dueDate + 'T12:00:00');
            let nextMonth = currentDueDate.getMonth() + 1;
            let nextYear = currentDueDate.getFullYear();
            
            if (nextMonth > 11) {
                nextMonth = 0;
                nextYear++;
            }
            
            const nextDueDate = new Date(nextYear, nextMonth, currentDueDate.getDate());
            if (currentDueDate.getDate() !== nextDueDate.getDate()) {
                 nextDueDate.setDate(0); 
            }

            const nextDateString = nextDueDate.toISOString().split('T')[0];

            const exists = bills.some(b => 
                b.name === originalBill.name && 
                b.dueDate === nextDateString && 
                Math.abs((parseFloat(b.amount) || 0) - (parseFloat(originalBill.amount) || 0)) < 0.01
            );

            if (!exists) {
                const newBill = {
                    id: Date.now(),
                    name: originalBill.name,
                    amount: originalBill.amount || 0,
                    dueDate: nextDateString,
                    category: originalBill.category,
                    paid: false,
                    doNotRenew: false // A nova conta inicia com a renovação ativada
                };
                bills.push(newBill);
                showToast('Pago & Renovado!', `A fatura para o próximo mês já foi gerada.`);
            } else {
                showToast('Pago', 'Conta marcada como paga.');
            }
        }

        // --- Renderização Principal ---
        function renderBills() {
            const listEl = document.getElementById('bills-list');
            listEl.innerHTML = '';

            const viewMonth = viewDate.getMonth();
            const viewYear = viewDate.getFullYear();
            
            // Lógica para capturar início do mês que está sendo visualizado
            const viewMonthStart = new Date(viewYear, viewMonth, 1);

            // Filtro Inteligente:
            const currentMonthBills = bills.filter(bill => {
                const billDate = new Date(bill.dueDate + 'T12:00:00');
                
                // Condição 1: A conta pertence a este mês que estamos vendo?
                const isThisMonth = billDate.getMonth() === viewMonth && billDate.getFullYear() === viewYear;
                
                // Condição 2: A conta NÃO está paga E o vencimento dela é de um mês anterior ao que estamos vendo?
                const isUnpaidAndPast = !bill.paid && billDate < viewMonthStart;
                
                return isThisMonth || isUnpaidAndPast;
            });

            const totalPending = currentMonthBills.filter(b => !b.paid).reduce((sum, b) => sum + (parseFloat(b.amount) || 0), 0);
            const totalPaid = currentMonthBills.filter(b => b.paid).reduce((sum, b) => sum + (parseFloat(b.amount) || 0), 0);
            
            document.getElementById('total-pending').innerText = formatCurrency(totalPending);
            document.getElementById('total-paid').innerText = formatCurrency(totalPaid);

            // --- Nova Lógica de Ordenação ---
            const sortOrder = document.getElementById('sort-order').value;

            currentMonthBills.sort((a, b) => {
                // Independente de data ou categoria, contas pagas vão pro final
                if (a.paid !== b.paid) return a.paid ? 1 : -1;

                if (sortOrder === 'date') {
                    // Ordenar por Data (Crescente)
                    return new Date(a.dueDate) - new Date(b.dueDate);
                } else if (sortOrder === 'category') {
                    // Ordenar por Nome da Categoria (A-Z)
                    const catA = categories.find(c => c.id === a.category)?.label || 'Outros';
                    const catB = categories.find(c => c.id === b.category)?.label || 'Outros';
                    
                    // Se estiverem na mesma categoria, ordena por data
                    if (catA === catB) {
                        return new Date(a.dueDate) - new Date(b.dueDate);
                    }
                    return catA.localeCompare(catB);
                }
            });

            if (currentMonthBills.length === 0) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-gray-400">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                            <i class="fas fa-coins text-3xl"></i>
                        </div>
                        <p class="text-sm font-medium">Nenhuma conta para este mês.</p>
                        <p class="text-xs mt-1">Navegue pelos meses ou adicione uma nova.</p>
                    </div>`;
                return;
            }

            const today = new Date();
            today.setHours(0,0,0,0);

            currentMonthBills.forEach(bill => {
                const dueDate = new Date(bill.dueDate + 'T12:00:00');
                const isOverdue = !bill.paid && dueDate < today;
                const daysDiff = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
                
                const cat = categories.find(c => c.id === bill.category) || { icon: 'fa-box', color: 'bg-gray-100 text-gray-600', label: 'Outros' };

                let statusBadge = '';
                let borderClass = 'border-l-4 border-gray-300';
                let bgClass = 'bg-white';
                let opacityClass = '';

                if (bill.paid) {
                    borderClass = 'border-l-4 border-emerald-500';
                    bgClass = 'bg-gray-50';
                    opacityClass = 'opacity-75 grayscale-[0.5]';
                    statusBadge = `<span class="text-[10px] font-bold text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded-full ml-auto flex items-center gap-1"><i class="fas fa-check"></i> PAGO</span>`;
                } else if (isOverdue) {
                    borderClass = 'border-l-4 border-red-500';
                    statusBadge = `<span class="text-[10px] font-bold text-red-600 bg-red-100 px-2 py-0.5 rounded-full ml-auto flex items-center gap-1"><i class="fas fa-exclamation-triangle"></i> ${Math.abs(daysDiff)} DIAS ATRASADO</span>`;
                } else if (daysDiff <= 3) {
                    borderClass = 'border-l-4 border-amber-500';
                    statusBadge = `<span class="text-[10px] font-bold text-amber-600 bg-amber-100 px-2 py-0.5 rounded-full ml-auto">VENCE EM BREVE</span>`;
                } else {
                     statusBadge = `<span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2 py-0.5 rounded-full ml-auto">EM ABERTO</span>`;
                }

                const recurrenceBadge = bill.doNotRenew 
                    ? `<p class="text-xs text-amber-600 mt-1 font-bold flex items-center gap-1"><i class="fas fa-stop-circle text-[10px]"></i> Encerra este mês</p>`
                    : `<p class="text-xs text-indigo-400 mt-1 font-medium flex items-center gap-1"><i class="fas fa-sync-alt text-[10px]"></i> Mensal</p>`;

                const actionButtonContent = bill.paid 
                    ? '<i class="fas fa-undo"></i> Desfazer Pagamento' 
                    : (bill.doNotRenew ? '<i class="fas fa-flag-checkered"></i> Pagar & Quitar' : '<i class="fas fa-check-double"></i> Pagar & Renovar');
                
                const actionButtonClass = bill.paid
                    ? 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                    : (bill.doNotRenew ? 'bg-amber-500 text-white hover:bg-amber-600 shadow-lg shadow-amber-500/20' : 'bg-emerald-600 text-white hover:bg-emerald-700 shadow-lg shadow-emerald-500/20');

                const renewCheckboxHtml = bill.paid ? '' : `
                    <div class="mb-3 bg-gray-50 p-2.5 rounded-lg border border-gray-100 flex items-center">
                        <label class="flex items-center gap-2 text-xs text-gray-700 cursor-pointer hover:text-gray-900 transition w-full">
                            <input type="checkbox" onchange="toggleRenew(${bill.id})" ${bill.doNotRenew ? 'checked' : ''} class="w-4 h-4 text-amber-500 bg-white border-gray-300 rounded focus:ring-amber-500 cursor-pointer">
                            <span class="font-semibold">Quitar conta (Não renovar no próximo mês)</span>
                        </label>
                    </div>
                `;

                // Badge da categoria caso ordenado por categoria para facilitar a leitura visual
                const categoryBadgeDisplay = sortOrder === 'category' 
                    ? `<span class="text-[10px] uppercase font-bold text-gray-400 mb-1 block tracking-wider">${cat.label}</span>`
                    : '';

                const html = `
                <div class="relative ${bgClass} ${borderClass} rounded-xl p-4 shadow-sm hover:shadow-md transition-all slide-in ${opacityClass}">
                    ${categoryBadgeDisplay}
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-xl ${cat.color} flex items-center justify-center text-xl shrink-0 shadow-sm" title="${cat.label}">
                            <i class="fas ${cat.icon}"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-bold text-gray-800 truncate pr-2">${bill.name}</h3>
                                ${statusBadge}
                            </div>
                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-xs text-gray-500 flex items-center gap-1">
                                        <i class="far fa-calendar"></i> Vence: ${formatDate(bill.dueDate)}
                                    </p>
                                    ${recurrenceBadge}
                                </div>
                                <div class="text-right">
                                    <span class="text-lg font-bold text-gray-900 block">${formatCurrency(bill.amount)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-gray-100">
                        ${renewCheckboxHtml}
                        <div class="flex items-center justify-between gap-3">
                            <button onclick="togglePaid(${bill.id})" class="flex-1 py-2 rounded-lg text-sm font-bold transition flex items-center justify-center gap-2 ${actionButtonClass}">
                                ${actionButtonContent}
                            </button>
                            <div class="flex gap-1">
                                <button onclick="editBill(${bill.id})" class="w-9 h-9 flex items-center justify-center text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition" title="Editar">
                                    <i class="fas fa-pen"></i>
                                </button>
                                <button onclick="deleteBill(${bill.id})" class="w-9 h-9 flex items-center justify-center text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition" title="Excluir">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
                
                listEl.innerHTML += html;
            });
        }

        // --- Helpers ---
        function formatCurrency(value) {
            const val = parseFloat(value) || 0;
            return val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function formatDate(dateString) {
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}`;
        }

        function renderCategorySelector() {
            const container = document.getElementById('category-selector');
            if (categories.length === 0) return;

            container.innerHTML = categories.map(cat => `
                <button type="button" 
                    onclick="selectCategoryForBill('${cat.id}')"
                    class="bill-cat-btn flex flex-col items-center justify-center min-w-[4rem] h-16 rounded-xl border-2 transition relative overflow-hidden group border-gray-100 bg-white"
                    data-id="${cat.id}">
                    <div class="${cat.color} w-8 h-8 rounded-full flex items-center justify-center text-sm mb-1 group-hover:scale-110 transition">
                        <i class="fas ${cat.icon}"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-gray-600 whitespace-nowrap overflow-hidden text-ellipsis w-full px-1 text-center">${cat.label}</span>
                </button>
            `).join('');
            
            if(categories.length > 0) {
                selectCategoryForBill(categories[0].id);
            }
        }

        function selectCategoryForBill(id) {
            document.getElementById('bill-category').value = id;
            document.querySelectorAll('.bill-cat-btn').forEach(btn => {
                if(btn.dataset.id === id) {
                    btn.classList.add('border-indigo-500', 'bg-indigo-50');
                    btn.classList.remove('border-gray-100', 'bg-white');
                } else {
                    btn.classList.remove('border-indigo-500', 'bg-indigo-50');
                    btn.classList.add('border-gray-100', 'bg-white');
                }
            });
        }

        // --- Modal & Form de Contas ---
        function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('bill-id').value;
            const name = document.getElementById('bill-name').value;
            const amount = document.getElementById('bill-amount').value || 0;
            const date = document.getElementById('bill-date').value;
            const category = document.getElementById('bill-category').value || categories[0].id;

            const billData = {
                id: id ? parseInt(id) : Date.now(),
                name,
                amount,
                dueDate: date,
                category,
                paid: false,
                doNotRenew: false // Nova propriedade para o controle de renovação
            };

            if (id) {
                const oldBill = bills.find(b => b.id === parseInt(id));
                if (oldBill) {
                    billData.paid = oldBill.paid;
                    billData.doNotRenew = oldBill.doNotRenew || false;
                }
                updateBill(billData);
            } else {
                addBill(billData);
            }
            closeModal();
        }

        function openModal() {
            document.getElementById('bill-form').reset();
            document.getElementById('bill-id').value = '';
            document.getElementById('modal-title').innerText = 'Nova Conta Recorrente';
            
            const now = new Date();
            if (viewDate.getMonth() !== now.getMonth()) {
                const suggestDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
                document.getElementById('bill-date').valueAsDate = suggestDate;
            } else {
                document.getElementById('bill-date').valueAsDate = now;
            }

            if(categories.length > 0) selectCategoryForBill(categories[0].id);
            
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function editBill(id) {
            const bill = bills.find(b => b.id === id);
            if (!bill) return;
            openModal();
            document.getElementById('modal-title').innerText = 'Editar Detalhes';
            document.getElementById('bill-id').value = bill.id;
            document.getElementById('bill-name').value = bill.name;
            document.getElementById('bill-amount').value = bill.amount;
            document.getElementById('bill-date').value = bill.dueDate;
            selectCategoryForBill(bill.category);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function showToast(title, message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-message').innerText = message;
            
            toast.classList.remove('-translate-y-20');
            toast.classList.add('translate-y-4');
            
            setTimeout(() => {
                toast.classList.add('-translate-y-20');
                toast.classList.remove('translate-y-4');
            }, 4000);
        }

        // --- Notificações ---
        function checkReminders() {
            if (!("Notification" in window) || Notification.permission !== "granted") return;
            
            const today = new Date();
            today.setHours(0,0,0,0);
            
            bills.forEach(bill => {
                if (bill.paid) return;
                const dueDate = new Date(bill.dueDate + 'T12:00:00');
                
                const diffTime = dueDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

                if (diffDays <= 3 && diffDays >= 0) {
                     new Notification(`Conta a Vencer: ${bill.name}`, {
                        body: `Valor: ${formatCurrency(bill.amount)}. Vence em breve!`,
                        icon: 'https://cdn-icons-png.flaticon.com/512/2331/2331941.png'
                    });
                }
            });
        }

        function toggleNotificationPermission() {
            if (!("Notification" in window)) {
                alert("Navegador sem suporte a notificações.");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    showToast("Sucesso", "Alertas ativados!");
                    checkReminders();
                }
            });
        }
    </script>
</body>
</html>
